<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Ant Colony</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #1a1410;
            overflow: hidden;
            height: 100%;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <script>
        // ============================================================
        // Canvas setup — devicePixelRatio-aware so it stays sharp on HiDPI
        // ============================================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels, not device pixels
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // ============================================================
        // Ant data — Structure of Arrays (SoA)
        // ============================================================
        const MAX_ANTS = 500;

        const ants = {
            x: new Float32Array(MAX_ANTS),
            y: new Float32Array(MAX_ANTS),
            rotation: new Float32Array(MAX_ANTS),
            speed: new Float32Array(MAX_ANTS),
            rotationSpeed: new Float32Array(MAX_ANTS),
            state: new Uint8Array(MAX_ANTS),
            idleTimer: new Float32Array(MAX_ANTS),
            id: new Uint32Array(MAX_ANTS),
            count: 0,
        }

        let nextId = 1;
        const idToIndex = new Map();


        function spawnAnt(x, y) {
            const i = ants.count++;
            const id = nextId++;
            ants.x[i] = x;
            ants.y[i] = y;
            ants.rotation[i] = Math.random() * 2 * Math.PI;
            ants.speed[i] = 40 + Math.random() * 15;
            ants.rotationSpeed[i] = Math.random() * 2 * Math.PI;
            ants.state[i] = 0;
            ants.idleTimer[i] = 0;
            ants.id[i] = id;
            idToIndex.set(id, i);
            return id;
        }

        function killAnt(index) {
            const last = ants.count - 1;
            const deadId = ants.id[index];
            idToIndex.delete(deadId);

            if (index !== last) {
            // swap last into the gap
            ants.x[index] = ants.x[last];
            ants.y[index] = ants.y[last];
            ants.rotation[index] = ants.rotation[last];
            ants.speed[index] = ants.speed[last];
            ants.rotationSpeed[index] = ants.rotationSpeed[last];
            ants.state[index] = ants.state[last];
            ants.idleTimer[index] = ants.idleTimer[last];
            ants.id[index] = ants.id[last];
            idToIndex.set(ants.id[index], index);  // update the moved ant's mapping
        }
        ants.count--;
        }

        // ============================================================
        // Sim step — wander steering + edge avoidance + integration
        // ============================================================
        // States
        const STATE_WANDER = 0;
        const STATE_IDLE   = 1;

        const IDLE_ENTER_CHANCE = 0.08;  // per second — chance to start idling while wandering
        const IDLE_MIN = 0.5;            // seconds
        const IDLE_MAX = 2.0;            // seconds
        const IDLE_TWITCH_CHANCE = 4.5; // per second — how often a twitch fires while idle
        const IDLE_TWITCH_AMOUNT = 0.6; // radians, single snap
        
        // Wander (open-field behavior)
        const WANDER_STRENGTH = 4.0;   // rad/sec² — noise magnitude injected into angular velocity
        const WANDER_DAMPING  = 3.0;   // 1/sec — how strongly angular velocity is pulled back to 0

        // Edge behavior
        const EDGE_MARGIN = 22;        // px — band width where edge logic activates
        const EDGE_STEER_BASE    = 1.5; // gentle bias while roughly parallel to the wall
        const EDGE_STEER_URGENCY = 9.0; // extra correction when heading straight at the wall
        const HUG_FRACTION = 0.85;     // 0-1 — target closeness to wall once hugging

        function simStep(dt) {
            const w = window.innerWidth;
            const h = window.innerHeight;

            for (let i = 0; i < ants.count; i++) {
                const idle = updateIdleState(ants, i, dt);

                if (idle) {
                    if (Math.random() < IDLE_TWITCH_CHANCE * dt) {
                        ants.rotation[i] += (Math.random() - 0.5) * IDLE_TWITCH_AMOUNT;
                    }
                    continue;
                }
                wander(ants, i, dt);
                edgeAvoid(ants, i, w, h, EDGE_MARGIN, dt);
                integrate(ants, i, dt);

                // hard clamp accounts for body extent, not just center point —
                // ANT_LENGTH is the furthest offset from center (the nose)
                if (ants.x[i] < ANT_LENGTH) ants.x[i] = ANT_LENGTH;
                if (ants.x[i] > w - ANT_LENGTH) ants.x[i] = w - ANT_LENGTH;
                if (ants.y[i] < ANT_LENGTH) ants.y[i] = ANT_LENGTH;
                if (ants.y[i] > h - ANT_LENGTH) ants.y[i] = h - ANT_LENGTH;
            }
        }

        function updateIdleState(ants, i, dt) {
            if (ants.state[i] === STATE_IDLE) {
                ants.idleTimer[i] -= dt;
                if (ants.idleTimer[i] <= 0) {
                    ants.state[i] = STATE_WANDER;
                }
                return true; // currently idle
            }

            // wandering — roll for a chance to start idling this tick
            if (Math.random() < IDLE_ENTER_CHANCE * dt) {
                ants.state[i] = STATE_IDLE;
                ants.idleTimer[i] = IDLE_MIN + Math.random() * (IDLE_MAX - IDLE_MIN);
                return true;
            }

            return false; // stays wandering
        }
        
        function wander(ants, i, dt) {
            const noise = (Math.random() - 0.5) * Math.sqrt(12); // rescale to unit variance
            ants.rotationSpeed[i] += WANDER_STRENGTH * noise * Math.sqrt(dt);
            ants.rotationSpeed[i] -= ants.rotationSpeed[i] * WANDER_DAMPING * dt;
            ants.rotation[i] += ants.rotationSpeed[i] * dt;
        }

        function edgeAvoid(ants, i, width, height, margin, dt) {
            let pushX = 0, pushY = 0;
            if (ants.x[i] < margin) pushX += (margin - ants.x[i]);
            else if (ants.x[i] > width - margin) pushX -= (ants.x[i] - (width - margin));
            if (ants.y[i] < margin) pushY += (margin - ants.y[i]);
            else if (ants.y[i] > height - margin) pushY -= (ants.y[i] - (height - margin));

            if (pushX === 0 && pushY === 0) return;

            const depth = Math.hypot(pushX, pushY); // 0 at margin's outer edge, ~margin at the wall
            const nx = pushX / depth, ny = pushY / depth; // points away from wall

            const hx = Math.cos(ants.rotation[i]), hy = Math.sin(ants.rotation[i]);
            const tA = { x: -ny, y: nx };
            const tB = { x: ny, y: -nx };
            const tangent = (tA.x * hx + tA.y * hy) > (tB.x * hx + tB.y * hy) ? tA : tB;

            // signed error vs desired hug distance: positive = too far from wall, negative = too close
            const desiredDepth = margin * HUG_FRACTION;
            const e = Math.max(-1, Math.min(1, (desiredDepth - depth) / margin));
            // e>0 pulls toward the wall (-normal), e<0 pushes away from it (+normal) — same vector, signed
            const desiredX = tangent.x * (1 - Math.abs(e)) - nx * e;
            const desiredY = tangent.y * (1 - Math.abs(e)) - ny * e;

            // danger: how directly the ant is currently heading INTO the wall.
            // +1 = heading straight away from wall (safe), -1 = heading straight at it (urgent).
            const headingDot = hx * nx + hy * ny;
            const danger = Math.max(0, -headingDot); // 0 when safe/parallel, ramps to 1 when charging straight in

            // blend base (loose hug, lets wander win) with urgency (sharp correction to avoid headbutt)
            const steerRate = EDGE_STEER_BASE + EDGE_STEER_URGENCY * danger;

            const targetAngle = Math.atan2(desiredY, desiredX);
            let diff = targetAngle - ants.rotation[i];
            diff = Math.atan2(Math.sin(diff), Math.cos(diff));

            ants.rotation[i] += diff * steerRate * dt;
        }

        function integrate(ants, i, dt) {
            ants.x[i] += Math.cos(ants.rotation[i]) * ants.speed[i] * dt;
            ants.y[i] += Math.sin(ants.rotation[i]) * ants.speed[i] * dt;
        }

        // ============================================================
        // Render — draw each ant as a small triangle pointing in heading
        // ============================================================
        const ANT_LENGTH = 6;
        const ANT_WIDTH = 2.5;
        
        function render() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);
            
            ctx.fillStyle = '#e8d8b8';
            for (let i = 0; i < ants.count; i++) {
                const x = ants.x[i];
                const y = ants.y[i];
                const a = ants.rotation[i];
                const cos = Math.cos(a);
                const sin = Math.sin(a);
            
                // triangle: nose forward, two back corners
                const noseX = x + cos * ANT_LENGTH;
                const noseY = y + sin * ANT_LENGTH;
                const backX = x - cos * ANT_LENGTH * 0.6;
                const backY = y - sin * ANT_LENGTH * 0.6;
                const perpX = -sin * ANT_WIDTH;
                const perpY = cos * ANT_WIDTH;
            
                ctx.beginPath();
                ctx.moveTo(noseX, noseY);
                ctx.lineTo(backX + perpX, backY + perpY);
                ctx.lineTo(backX - perpX, backY - perpY);
                ctx.closePath();
                ctx.fill();
            }
        }

        // ============================================================
        // Fixed timestep loop — sim runs at fixed rate, render runs at display rate
        // ============================================================
        const SIM_HZ = 60;
        const SIM_DT = 1 / SIM_HZ;
        let accumulator = 0;
        let lastTime = performance.now();
        
        function frame(now) {
            const frameTime = Math.min((now - lastTime) / 1000, 0.25); // clamp on tab-switch stalls
            lastTime = now;
            accumulator += frameTime;
            
            while (accumulator >= SIM_DT) {
                simStep(SIM_DT);
                accumulator -= SIM_DT;
            }
            
            render();
            requestAnimationFrame(frame);
        }

        // ============================================================
        // Init
        // ============================================================
        for (let i = 0; i < 80; i++) {
            spawnAnt(
                window.innerWidth / 2 + (Math.random() - 0.5) * 100,
                window.innerHeight / 2 + (Math.random() - 0.5) * 100
            );
        }
        
        requestAnimationFrame(frame);
    </script>
</body>
</html>
